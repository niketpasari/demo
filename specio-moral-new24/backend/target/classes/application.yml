spring:
  application:
    name: product-authentication-api
  
  datasource:
    url: jdbc:mysql://localhost:3306/verifyauth_db
    username: verifyauth
    password: verifyauth123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  mail:
    host: smtp.hostinger.com
    port: 465
    username: support@thegrehvitti.com
    password: Speci0m0ral#
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-for-hs256}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# CORS Configuration
# Add your network IP to allowed-origins for testing from other devices
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://192.168.1.100:3000,http://192.168.0.100:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# App Configuration
app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  mail-from: ${MAIL_FROM:support@thegrehvitti.com}

# Logging
logging:
  level:
    com.verifyauth: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
